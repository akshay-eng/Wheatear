<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheatear Console</title>
  <meta name="description" content="Wheatear Console — manage AI agent migrations between orchestration platforms." />
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <script>
    // Theme bootstrap before first paint — no flash of wrong theme.
    (function () {
      try {
        var forced = new URLSearchParams(location.search).get("theme");
        var saved = localStorage.getItem("wheatear.theme");
        var theme = forced || saved || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
        document.documentElement.dataset.theme = theme === "light" ? "light" : "dark";
      } catch (e) { /* default dark stands */ }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
